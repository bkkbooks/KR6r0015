front:
  text: 續刻釋氏稽古略序古可稽乎曰烏乎可古不可稽乎曰烏乎不可威音以後今日以前成住壞空有而不有日月光華旦而復旦日劫無憑何況今古矣其中聖賢隱現應緣示感如月在水了不可執迺有人焉追往烈訂遺踪取已散之塵而編之而續之是繪夢也是圖影也然而紀往開來闡微昭信俾古德之跡炳然如天漢之昭回而其所以跡者繇是而可悟焉未易忽也往參真寂先師授予以寶洲稽古略曰法門源流盡在斯矣予受而卒業約而不遺核而有則釋氏之紫陽漂水也然而流行勿遠漸就晦翳恒懼遺文湮沒致昔人編摩敘述之苦心若存若亡隱而勿著名山之藏詎能無慨乎哉戊寅春王搆小庵於古杏溪延幻師主之雨晨月夕相與沈吟梵冊寄懷愷樂陶陶如也一日偶理前說幻師謂宜重加繡黻以待來者初以傳述舊聞已乃兼舉未備附以勝國暨皇明法苑事蹟勒成一書寶洲之業復光著若發蒙矣後之攬此者應化之殊祥奇表往哲之妙道奇功以迨我皇祖列宗冥苻玄契顯揚正覺以不思議之理成大有為之運開卷釐然昭茲雲日俾夫懷疑者起信論世者可徵考事者尋微覽跡者悟本所以嘉惠來學匪曰小補之矣而豈徒掇敘事之華增多聞之障雲已渡而摹其悠揚波已逝而貌其翻湧乎哉崇禎戊寅歲朱明月佛出世日蘧庵居士嚴爾珪謹序續集稽古略敘甞言為僧而不兼外學懶而愚非博也難乎其高為儒而不究內典庸而僻非通也烏乎其大株守而弗移自畫而無進空腹高心拘墟朿教終貽笑於大方也已矣試觀古昔之博碩鉅公淵宏開士誰不出入於內外典章圓融淹貫張天覺云吾因學佛然後知儒妙蓮經云治世語言皆順正法群茸釀蜜眾味和𦎟匪能博涉而通研寧識殊岐而一詣哉然古今傳記之作各有所專國史則遺佛教禪編則略世緣無怪乎二宗學者之非博非通也有元名衲華亭念常所集佛祖通載兼繫歷朝綱紀繼此職里高僧寶洲釋鑑稽古一書備列皇王政治賢聖風規佛祖源流法門軌則編年敘世一貫無遺俾夫簡閱之者其猶瞻象闕而躔度詳明探龍宮而珠璣畢聚富哉此書無分儒釋宜家貯而戶蓄枕寶而袖珍者焉奚特名山藏為哉杏溪大參蘧菴嚴翁乘大願輪不忘付囑弘通之莂抽資重刻冀廣流傳不慧寓幻其廬備員校訂因并緝輯元世熙朝兩代事蹟纘承其後庶見古今上下之道脈連持世與出世之宗猷踵接擬茲續貂之尾蓋不欲為最後斷佛種之人繪空摹影以俟來哲觀感興起聯輝續焰以無窮焉耳時皇明崇禎龍集著雍攝提格月屆蕤賓敦牂令節壽光比丘大聞薰沐撰
